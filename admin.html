<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<title>Mira Estudio — Admin</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>

:root{
  --c1:#8C0026;--c1d:#620018;--c1l:#B0003A;
  --gold:#C9A84C;--goldl:#E8D5A0;--goldp:#FDF5DC;--goldd:#9A7A2A;
  --dark:#1A0008;--darkm:#3B000F;
  --cr:#FFF8F0;--crd:#F5EBD8;--sw:#FFFAF5;
  --muted:#7A4A52;
  --fd:'Cormorant Garamond',serif;
  --fb:'DM Sans',sans-serif;
  --r1:6px;--r2:14px;--r3:22px;
  --s1:0 1px 4px rgba(26,0,8,.1);
  --s2:0 4px 24px rgba(26,0,8,.15);
  --s3:0 14px 60px rgba(26,0,8,.24);
  --hero-bg1:#1A0008;--hero-bg2:#620018;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--fb);background:var(--cr);color:var(--dark);min-height:100vh;overflow-x:hidden;}
.view{display:none;min-height:100vh;}
.view.active{display:flex;flex-direction:column;}
#view-dashboard{flex-direction:row;}

/* ── NAV ── */
.lnav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 5vw;height:70px;background:rgba(26,0,8,.95);backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,168,76,.2);}
.brand-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:11px;font-family:var(--fd);font-size:23px;font-weight:600;letter-spacing:.06em;color:var(--goldl);user-select:none;}
.logo-nav{height:38px;width:38px;object-fit:contain;mix-blend-mode:screen;border-radius:50%;}
.logo-hero{height:110px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.12);}
.logo-sb{height:32px;width:32px;object-fit:contain;mix-blend-mode:screen;}
.nav-links{display:flex;gap:30px;}
.nav-links a{font-size:14px;color:rgba(255,248,240,.65);text-decoration:none;transition:.2s;}
.nav-links a:hover{color:var(--goldl);}
.nav-acts{display:flex;gap:9px;}
.btn-g{background:none;border:1px solid rgba(201,168,76,.4);color:var(--goldl);padding:8px 20px;border-radius:50px;font-family:var(--fb);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;}
.btn-g:hover{background:rgba(201,168,76,.15);}
.btn-p{background:var(--gold);color:var(--dark);border:none;padding:8px 20px;border-radius:50px;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
.btn-p:hover{background:var(--goldd);color:#fff;}
.btn-gold{background:var(--gold);color:var(--dark);border:none;padding:13px 34px;border-radius:50px;font-family:var(--fb);font-size:15px;font-weight:600;cursor:pointer;transition:.2s;}
.btn-gold:hover{background:var(--goldd);color:#fff;}
.btn-crimson{background:var(--c1);color:#fff;border:none;padding:10px 22px;border-radius:50px;font-family:var(--fb);font-size:14px;font-weight:600;cursor:pointer;transition:.2s;}
.btn-crimson:hover{background:var(--c1d);}

/* ── HERO ── */
.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 5vw 80px;position:relative;overflow:hidden;}
.hero-media{position:absolute;inset:0;z-index:0;}
.hero-media img,.hero-media video{width:100%;height:100%;object-fit:cover;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(26,0,8,.9) 0%,rgba(98,0,24,.78) 50%,rgba(59,0,15,.85) 100%);z-index:1;}
.hero-ornament{position:absolute;border-radius:50%;border:1px solid rgba(201,168,76,.12);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:2;}
.h-o1{width:480px;height:480px;}.h-o2{width:720px;height:720px;border-color:rgba(201,168,76,.07);}.h-o3{width:960px;height:960px;border-color:rgba(201,168,76,.04);}
.hero-content{position:relative;z-index:3;max-width:760px;}
.hero-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(201,168,76,.15);color:var(--goldl);padding:6px 17px;border-radius:50px;font-size:11.5px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;margin-bottom:22px;border:1px solid rgba(201,168,76,.3);}
.hero h1{font-family:var(--fd);font-size:clamp(44px,7vw,86px);font-weight:300;line-height:1.06;color:var(--cr);letter-spacing:-.01em;margin-bottom:20px;}
.hero h1 em{font-style:italic;color:var(--goldl);}
.hero p{font-size:16.5px;line-height:1.7;color:rgba(255,248,240,.6);max-width:500px;margin:0 auto 36px;font-weight:300;}
.hero-acts{display:flex;align-items:center;justify-content:center;gap:13px;flex-wrap:wrap;}
.hero-stats{display:flex;align-items:center;justify-content:center;gap:42px;margin-top:52px;padding-top:36px;border-top:1px solid rgba(201,168,76,.2);}
.stat-num{font-family:var(--fd);font-size:36px;font-weight:500;color:var(--goldl);display:block;}
.stat-lbl{font-size:11px;color:rgba(255,248,240,.5);letter-spacing:.06em;text-transform:uppercase;}

/* ── SECTION ── */
.sec{padding:80px 5vw;}
.sec-lbl{font-size:11.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--goldd);margin-bottom:13px;}
.sec-tit{font-family:var(--fd);font-size:clamp(32px,5vw,52px);font-weight:400;line-height:1.1;color:var(--dark);max-width:540px;margin-bottom:40px;}
.sec-tit em{font-style:italic;color:var(--c1);}

/* ── FEATURES ── */
.feat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px;}
.feat-card{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);padding:30px 26px;transition:.25s;}
.feat-card:hover{box-shadow:var(--s2);transform:translateY(-2px);}
.feat-icon{width:44px;height:44px;border-radius:var(--r2);background:rgba(140,0,38,.08);display:flex;align-items:center;justify-content:center;margin-bottom:15px;font-size:20px;}
.feat-card h3{font-family:var(--fd);font-size:19px;font-weight:500;margin-bottom:7px;}
.feat-card p{font-size:13.5px;color:var(--muted);line-height:1.65;}

/* ── DARK SECTION ── */
.sec-dark{background:var(--dark);}
.sec-dark .sec-lbl{color:var(--gold);}
.cpc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;}
.cpc{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.15);border-radius:var(--r3);overflow:hidden;transition:.25s;cursor:pointer;}
.cpc:hover{background:rgba(201,168,76,.07);transform:translateY(-3px);border-color:rgba(201,168,76,.35);}
.cpc-thumb{height:170px;display:flex;align-items:center;justify-content:center;font-size:52px;}
.cpc-body{padding:19px;}
.cpc-tag{display:inline-block;background:rgba(201,168,76,.18);color:var(--gold);padding:3px 9px;border-radius:50px;font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:7px;}
.cpc-title{font-family:var(--fd);font-size:19px;font-weight:500;color:var(--cr);margin-bottom:5px;}
.cpc-desc{font-size:13px;color:rgba(255,248,240,.5);line-height:1.6;margin-bottom:11px;}
.cpc-meta{font-size:12px;color:rgba(255,248,240,.35);}

/* ── CTA ── */
.sec-cta{background:var(--c1);text-align:center;padding:80px 5vw;}
.sec-cta .sec-tit{color:var(--cr);margin:0 auto 11px;text-align:center;}
.sec-cta .sec-tit em{color:var(--goldl);}
.sec-cta p{color:rgba(255,248,240,.65);font-size:15.5px;margin-bottom:32px;}

/* ── FOOTER ── */
.footer{background:var(--dark);color:rgba(255,248,240,.4);padding:40px 5vw;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:13px;}
.footer .brand-btn{color:var(--goldl);font-size:20px;}
.footer p{font-size:13px;}

/* ── AUTH ── */
.ov{display:none;position:fixed;inset:0;z-index:200;background:rgba(26,0,8,.76);backdrop-filter:blur(9px);align-items:center;justify-content:center;padding:18px;}
.ov.open{display:flex;}
.auth-card{background:var(--sw);border-radius:var(--r3);padding:40px 36px;width:100%;max-width:415px;box-shadow:var(--s3);position:relative;border:1px solid rgba(201,168,76,.2);animation:su .28s cubic-bezier(.4,0,.2,1);}
@keyframes su{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.auth-close{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s;}
.auth-close:hover{background:var(--crd);}
.auth-brand{text-align:center;margin-bottom:22px;}
.auth-tabs{display:flex;gap:2px;background:var(--crd);border-radius:6px;padding:3px;margin-bottom:20px;}
.auth-tab{flex:1;text-align:center;padding:8px;border-radius:5px;font-size:13px;font-weight:500;cursor:pointer;transition:.2s;background:none;border:none;color:var(--muted);font-family:var(--fb);}
.auth-tab.active{background:var(--sw);color:var(--dark);}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:11.5px;font-weight:500;color:var(--dark);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border-radius:var(--r1);border:1px solid var(--crd);background:var(--cr);font-family:var(--fb);font-size:13.5px;color:var(--dark);outline:none;transition:.2s;resize:vertical;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold);}
.fg input::placeholder{color:var(--muted);opacity:.5;}
.btn-auth{width:100%;padding:12px;border-radius:50px;border:none;background:var(--c1);color:#fff;font-family:var(--fb);font-size:14.5px;font-weight:600;cursor:pointer;transition:.2s;margin-top:3px;}
.btn-auth:hover{background:var(--c1d);}
.auth-divider{text-align:center;font-size:12px;color:var(--muted);margin:10px 0;}
.auth-demo{width:100%;padding:9px;border-radius:50px;border:1px solid rgba(201,168,76,.4);background:none;color:var(--dark);font-family:var(--fb);font-size:13.5px;cursor:pointer;transition:.2s;}
.auth-demo:hover{background:var(--goldp);}
.auth-error{background:#fde8e8;border:1px solid #fbb;color:#8B0000;padding:8px 12px;border-radius:var(--r1);font-size:13px;margin-bottom:11px;display:none;}

/* ── ADMIN KEY ── */
.admin-key-input{width:100%;padding:11px 14px;border-radius:var(--r1);border:1px solid rgba(201,168,76,.35);background:rgba(140,0,38,.05);font-family:var(--fb);font-size:14px;color:var(--dark);outline:none;margin-bottom:9px;text-align:center;letter-spacing:.1em;}
.admin-key-input:focus{border-color:var(--c1);}

/* ── MODALS ── */
.modal-ov{display:none;position:fixed;inset:0;z-index:400;background:rgba(26,0,8,.72);backdrop-filter:blur(7px);align-items:center;justify-content:center;padding:16px;}
.modal-ov.open{display:flex;}
.mcard{background:var(--sw);border-radius:var(--r3);padding:28px 24px;width:100%;max-width:640px;box-shadow:var(--s3);border:1px solid rgba(201,168,76,.2);position:relative;max-height:88vh;overflow-y:auto;animation:su .25s cubic-bezier(.4,0,.2,1);}
.mcard-sm{max-width:460px;}
.mtit{font-family:var(--fd);font-size:21px;font-weight:500;color:var(--dark);margin-bottom:16px;}
.mclose{position:absolute;top:12px;right:12px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s;}
.mclose:hover{background:var(--crd);}

/* ── FAB ── */
.fab-wrap{position:fixed;bottom:26px;right:26px;z-index:300;display:none;}
.fab-btn{width:50px;height:50px;border-radius:50%;background:var(--c1);border:2px solid var(--gold);color:var(--goldl);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--s2);transition:.25s;font-weight:700;letter-spacing:0;}
.fab-btn:hover{background:var(--c1d);transform:scale(1.07);}
.fab-menu{position:absolute;bottom:60px;right:0;background:var(--sw);border:1px solid rgba(201,168,76,.25);border-radius:var(--r3);box-shadow:var(--s3);overflow:hidden;min-width:210px;opacity:0;pointer-events:none;transform:translateY(10px) scale(.96);transition:.22s cubic-bezier(.4,0,.2,1);}
.fab-menu.open{opacity:1;pointer-events:auto;transform:translateY(0) scale(1);}
.fab-item{display:flex;align-items:center;gap:12px;padding:13px 17px;cursor:pointer;transition:.2s;border:none;border-bottom:1px solid rgba(201,168,76,.1);width:100%;text-align:left;font-family:var(--fb);font-size:14px;color:var(--dark);background:none;}
.fab-item:last-child{border-bottom:none;}
.fab-item:hover{background:var(--goldp);color:var(--c1);}
.fab-item-icon{font-size:18px;width:24px;text-align:center;}

/* ── SIDEBAR ── */
.sidebar{width:252px;min-height:100vh;flex-shrink:0;background:var(--dark);border-right:1px solid rgba(201,168,76,.15);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;transition:transform .3s ease;}
.sb-logo{padding:18px 16px;border-bottom:1px solid rgba(201,168,76,.15);display:flex;align-items:center;gap:10px;}
.sb-brand{font-family:var(--fd);font-size:17px;font-weight:600;color:var(--goldl);letter-spacing:.05em;}
.sb-nav{flex:1;padding:14px 7px;overflow-y:auto;}
.sb-slbl{font-size:10px;font-weight:500;color:rgba(201,168,76,.45);text-transform:uppercase;letter-spacing:.12em;padding:0 11px;margin-bottom:4px;margin-top:14px;}
.sb-slbl:first-child{margin-top:0;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:var(--r2);color:rgba(255,248,240,.5);font-size:13.5px;cursor:pointer;transition:.2s;border:none;background:none;width:100%;text-align:left;font-family:var(--fb);}
.sb-item:hover{background:rgba(201,168,76,.1);color:var(--goldl);}
.sb-item.active{background:rgba(140,0,38,.5);color:var(--goldl);font-weight:500;border:1px solid rgba(201,168,76,.2);}
.sb-icon{font-size:15px;width:19px;text-align:center;}
.sb-badge{margin-left:auto;background:var(--c1);color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:50px;}
.sb-user{padding:12px 14px;border-top:1px solid rgba(201,168,76,.15);display:flex;align-items:center;gap:10px;}
.uav{width:33px;height:33px;border-radius:50%;background:linear-gradient(135deg,var(--c1l),var(--c1));display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:13px;font-weight:600;color:var(--goldl);flex-shrink:0;border:1px solid rgba(201,168,76,.3);}
.uname{font-size:13px;font-weight:500;color:var(--goldl);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.urole{font-size:11px;color:rgba(255,248,240,.4);}
.btn-logout{background:none;border:none;cursor:pointer;color:rgba(255,248,240,.35);font-size:16px;transition:.2s;}
.btn-logout:hover{color:var(--gold);}

/* ── MAIN ── */
.main-content{margin-left:252px;flex:1;min-height:100vh;background:var(--cr);display:flex;flex-direction:column;}
.topbar{height:60px;background:var(--sw);border-bottom:1px solid var(--crd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;position:sticky;top:0;z-index:40;}
.tb-title{font-family:var(--fd);font-size:20px;font-weight:500;color:var(--dark);}
.btn-icon{width:32px;height:32px;border-radius:var(--r2);background:none;border:1px solid var(--crd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:14px;}
.btn-icon:hover{background:var(--cr);}
.pc{padding:26px 24px;flex:1;}

/* ── WELCOME ── */
.welcome-banner{background:linear-gradient(130deg,var(--dark),var(--c1d));border-radius:var(--r3);padding:28px 32px;display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;position:relative;overflow:hidden;border:1px solid rgba(201,168,76,.2);}
.welcome-banner::before{content:'';position:absolute;right:-40px;top:-60px;width:220px;height:220px;border-radius:50%;background:rgba(201,168,76,.1);}
.wb-text h2{font-family:var(--fd);font-size:27px;font-weight:400;color:var(--cr);margin-bottom:5px;position:relative;z-index:1;}
.wb-text h2 em{font-style:italic;color:var(--goldl);}
.wb-text p{font-size:13px;color:rgba(255,248,240,.5);position:relative;z-index:1;}
.wb-emoji{font-size:50px;position:relative;z-index:1;}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px;}
.scard{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);padding:19px;}
.scard-lbl{font-size:11px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:7px;}
.scard-val{font-family:var(--fd);font-size:31px;font-weight:500;color:var(--dark);line-height:1;}
.scard-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.sec-heading{font-family:var(--fd);font-size:22px;font-weight:500;color:var(--dark);margin-bottom:15px;}

/* ── CAROUSEL ── */
.carousel-section{margin-bottom:30px;}
.carousel-nav{display:flex;gap:0;background:var(--crd);border-radius:var(--r3);padding:4px;margin-bottom:18px;border:1px solid rgba(201,168,76,.15);}
.car-tab{flex:1;padding:11px 10px;border-radius:calc(var(--r3) - 4px);font-family:var(--fd);font-size:17px;font-weight:500;text-align:center;cursor:pointer;transition:.25s;border:none;background:none;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;}
.car-tab.active{background:var(--dark);color:var(--goldl);box-shadow:var(--s1);}
.car-tab:hover:not(.active){background:rgba(140,0,38,.07);color:var(--c1);}
.car-tab-icon{font-size:19px;}
.carousel-body{position:relative;overflow:hidden;border-radius:var(--r3);}
.car-panel{display:none;}
.car-panel.active{display:block;}

/* ── COURSE CARDS ── */
.courses-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;}
.course-card{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);overflow:hidden;cursor:pointer;transition:.25s;}
.course-card:hover{box-shadow:var(--s3);transform:translateY(-4px);}
.cct{height:180px;display:flex;align-items:center;justify-content:center;font-size:58px;position:relative;overflow:hidden;}
.cctbg{position:absolute;inset:0;}
.ccte{position:relative;z-index:1;}
.ccc{padding:19px;}
.cch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.ccn{font-family:var(--fd);font-size:18.5px;font-weight:500;color:var(--dark);line-height:1.2;flex:1;}
.clvl{display:inline-block;padding:3px 8px;border-radius:50px;font-size:10px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0;margin-left:7px;}
.lvl-b{background:#E8F5E9;color:#2E7D32;}.lvl-i{background:#FFF8E1;color:#F57F17;}.lvl-a{background:rgba(140,0,38,.08);color:var(--c1);}
.ccd{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:13px;}
.ccf{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--crd);}
.cmi{font-size:12px;color:var(--muted);}
.clocked{opacity:.55;cursor:default;}
.lckbdg{display:flex;align-items:center;gap:4px;background:var(--crd);padding:5px 10px;border-radius:50px;font-size:11px;color:var(--muted);}

/* ── EBOOK CARDS ── */
.ebook-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
.ebook-card{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);padding:24px 20px;text-align:center;cursor:pointer;transition:.25s;}
.ebook-card:hover{box-shadow:var(--s2);transform:translateY(-3px);}
.ebook-cover{width:80px;height:110px;border-radius:8px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative;}
.ebook-title{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--dark);margin-bottom:5px;}
.ebook-desc{font-size:12.5px;color:var(--muted);line-height:1.55;margin-bottom:12px;}
.ebook-price{font-family:var(--fd);font-size:19px;font-weight:500;color:var(--c1);}
.ebook-free{color:#2E7D32;}

/* ── TURNO SECTION ── */
.turno-section{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);padding:28px;}
.turno-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;}
.turno-info h3{font-family:var(--fd);font-size:24px;font-weight:500;color:var(--dark);margin-bottom:10px;}
.turno-info p{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:16px;}
.turno-service-list{display:flex;flex-direction:column;gap:8px;}
.tsv{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--cr);border:1px solid var(--crd);border-radius:var(--r2);cursor:pointer;transition:.2s;}
.tsv:hover{background:var(--goldp);border-color:rgba(201,168,76,.4);}
.tsv-icon{font-size:19px;}
.tsv-name{font-size:13.5px;color:var(--dark);font-weight:500;}
.turno-form{background:var(--cr);border-radius:var(--r2);padding:20px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── CONTINUE ── */
.cc-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:28px;}
.cc{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);padding:16px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:.25s;}
.cc:hover{box-shadow:var(--s2);transform:translateY(-2px);}
.cc-thumb{width:48px;height:48px;border-radius:var(--r2);background:rgba(140,0,38,.08);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;border:1px solid rgba(201,168,76,.2);}
.cc-title{font-size:13.5px;font-weight:500;color:var(--dark);margin-bottom:3px;}
.cc-meta{font-size:12px;color:var(--muted);margin-bottom:7px;}
.pb{height:4px;background:var(--crd);border-radius:2px;overflow:hidden;}
.pf{height:100%;background:linear-gradient(90deg,var(--c1),var(--gold));border-radius:2px;transition:width .4s;}
.pl{font-size:10.5px;color:var(--muted);margin-top:3px;}

/* ── ACARD ── */
.acard{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);padding:20px;margin-bottom:16px;}
.acard-title{font-family:var(--fd);font-size:18px;font-weight:500;color:var(--dark);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}

/* ── RLIST ── */
.rlist{display:flex;flex-direction:column;gap:8px;}
.ritem{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sw);border:1px solid var(--crd);border-radius:var(--r2);cursor:pointer;transition:.2s;}
.ritem:hover{background:var(--goldp);border-color:rgba(201,168,76,.4);}
.rico{font-size:18px;}.rname{font-size:13.5px;color:var(--dark);font-weight:500;}.rtype{font-size:11.5px;color:var(--muted);}

/* ── VIEWER ── */
#view-course-viewer{flex-direction:column;}
.vtop{height:60px;background:var(--dark);border-bottom:1px solid rgba(201,168,76,.2);display:flex;align-items:center;gap:13px;padding:0 20px;flex-shrink:0;position:sticky;top:0;z-index:50;}
.vback{display:flex;align-items:center;gap:7px;background:none;border:none;cursor:pointer;color:rgba(255,248,240,.6);font-family:var(--fb);font-size:13.5px;transition:.2s;}
.vback:hover{color:var(--goldl);}
.vcname{font-family:var(--fd);font-size:18px;font-weight:500;color:var(--goldl);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vpw{display:flex;align-items:center;gap:8px;}
.vpbar{width:140px;height:5px;background:rgba(255,255,255,.15);border-radius:3px;overflow:hidden;}
.vpfill{height:100%;background:linear-gradient(90deg,var(--c1l),var(--gold));border-radius:3px;transition:width .4s;}
.vpt{font-size:12px;color:rgba(255,248,240,.5);white-space:nowrap;}
.vbody{display:flex;flex:1;min-height:0;}
.vs{width:290px;background:var(--sw);border-right:1px solid var(--crd);overflow-y:auto;flex-shrink:0;}
.vs-hdr{padding:17px 16px 12px;border-bottom:1px solid var(--crd);}
.vs-hdr h3{font-family:var(--fd);font-size:16px;font-weight:500;color:var(--dark);}
.vs-hdr p{font-size:12px;color:var(--muted);margin-top:2px;}
.mod-sec{border-bottom:1px solid var(--crd);}
.mod-hdr{padding:11px 15px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:.2s;}
.mod-hdr:hover{background:var(--cr);}
.mod-hdr.open{background:rgba(140,0,38,.05);}
.mod-num{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.mod-name{font-size:13px;font-weight:500;color:var(--dark);}
.mod-chev{font-size:10px;color:var(--muted);transition:transform .2s;}
.mod-chev.open{transform:rotate(180deg);}
.mod-lessons{display:none;}
.mod-lessons.open{display:block;}
.les-item{padding:9px 15px 9px 25px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:.2s;border-left:3px solid transparent;}
.les-item:hover{background:var(--cr);}
.les-item.active{background:rgba(140,0,38,.05);border-left-color:var(--c1);}
.les-st{width:19px;height:19px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
.les-st.done{background:var(--gold);color:var(--dark);}.les-st.current{background:var(--c1);color:#fff;}.les-st.locked{background:var(--crd);color:var(--muted);}
.les-name{font-size:13px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.les-item.active .les-name{font-weight:500;}
.les-dur{font-size:11px;color:var(--muted);margin-top:2px;}
.vmain{flex:1;overflow-y:auto;}
.vid-area{background:var(--dark);position:relative;padding-bottom:42%;overflow:hidden;}
.vid-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.play-btn{width:64px;height:64px;border-radius:50%;background:rgba(201,168,76,.85);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.25s;font-size:22px;}
.play-btn:hover{background:var(--gold);transform:scale(1.08);}
.vlt{font-family:var(--fd);font-size:21px;color:var(--cr);font-weight:400;}
.vls{font-size:12px;color:rgba(255,248,240,.45);}
.lcwrap{padding:28px 32px;max-width:740px;}
.lctit{font-family:var(--fd);font-size:29px;font-weight:400;color:var(--dark);margin-bottom:6px;}
.lcmeta{display:flex;gap:12px;margin-bottom:20px;}
.lcmeta span{font-size:12.5px;color:var(--muted);}
.lcdesc{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:28px;}
.lcres h4{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--dark);margin-bottom:10px;}
.lesson-nav{display:flex;justify-content:space-between;align-items:center;padding:20px 32px 28px;border-top:1px solid var(--crd);}

/* ── TOAST ── */
.toast{position:fixed;bottom:84px;right:24px;background:var(--dark);color:var(--goldl);padding:10px 16px;border-radius:var(--r2);font-size:14px;box-shadow:var(--s3);z-index:500;opacity:0;pointer-events:none;transform:translateY(10px);transition:.3s ease;border:1px solid rgba(201,168,76,.3);}
.toast.show{opacity:1;transform:translateY(0);}

.menu-toggle{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:var(--dark);margin-right:6px;}
.divider{height:1px;background:var(--crd);margin:14px 0;}

@media(max-width:768px){
  .nav-links{display:none;}
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);box-shadow:var(--s3);}
  .main-content{margin-left:0;}
  .menu-toggle{display:block;}
  .vs{display:none;width:0;}
  .vs.open{display:block;width:270px;position:fixed;top:60px;left:0;bottom:0;z-index:40;box-shadow:var(--s3);}
  .vid-area{padding-bottom:58%;}
  .lcwrap,.lnav{padding:16px 13px;}
  .pc{padding:16px 12px;}
  .vpw{display:none;}
  .row2{grid-template-columns:1fr;}
  .welcome-banner{flex-direction:column;text-align:center;gap:12px;}
  .auth-card{padding:28px 16px;}
  .turno-grid{grid-template-columns:1fr;}
  .ebook-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));}
  .hero-stats{gap:20px;flex-wrap:wrap;}
}

/* ══════════ ADMIN PANEL ══════════ */
.adm-sb{width:230px;background:var(--dark);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0;}
.adm-sb-top{padding:20px 18px 14px;border-bottom:1px solid rgba(201,168,76,.12);}
.adm-sb-brand{font-family:var(--fd);font-size:14.5px;color:var(--goldl);margin-top:7px;letter-spacing:.04em;}
.adm-sb-sub{font-size:11px;color:rgba(255,248,240,.38);margin-top:2px;}
.adm-nav{flex:1;padding:10px 0;overflow-y:auto;}
.adm-group{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,248,240,.28);padding:13px 17px 5px;}
.adm-ni{display:flex;align-items:center;gap:9px;width:100%;padding:9px 17px;background:none;border:none;border-left:3px solid transparent;cursor:pointer;color:rgba(255,248,240,.58);font-family:var(--fb);font-size:13px;text-align:left;transition:.16s;}
.adm-ni:hover{background:rgba(201,168,76,.07);color:var(--goldl);}
.adm-ni.active{background:rgba(201,168,76,.11);color:var(--goldl);border-left-color:var(--gold);}
.adm-exit{padding:14px 17px;background:none;border:none;border-top:1px solid rgba(201,168,76,.1);cursor:pointer;color:rgba(255,248,240,.38);font-family:var(--fb);font-size:12.5px;text-align:left;width:100%;transition:.2s;}
.adm-exit:hover{color:var(--goldl);}
.adm-body{flex:1;background:#F5F0EB;overflow-y:auto;min-height:100vh;}
.adm-pg{display:none;padding:26px 30px;max-width:900px;}
.adm-pg.active{display:block;}
.adm-pghdr{margin-bottom:22px;}
.adm-pghdr h2{font-family:var(--fd);font-size:27px;font-weight:400;color:var(--dark);line-height:1.1;}
.adm-pghdr p{color:var(--muted);font-size:13.5px;margin-top:5px;}
.acard{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r2);padding:20px;margin-bottom:16px;}
.acard h3{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--dark);margin-bottom:14px;}
.adm-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.adm-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.abtn{background:var(--c1);color:#fff;border:none;padding:9px 22px;border-radius:50px;font-family:var(--fb);font-size:13.5px;font-weight:600;cursor:pointer;transition:.2s;}
.abtn:hover{background:var(--c1d);}
.abtn-g{background:none;border:1px solid var(--crd);color:var(--dark);padding:8px 17px;border-radius:50px;font-family:var(--fb);font-size:13px;cursor:pointer;transition:.2s;}
.abtn-g:hover{background:var(--crd);}
.abtn-del{background:none;border:1px solid #fbb;color:#c0392b;padding:5px 12px;border-radius:50px;font-family:var(--fb);font-size:12px;cursor:pointer;transition:.2s;}
.abtn-del:hover{background:#fde8e8;}
.abtn-add{background:rgba(140,0,38,.07);border:1.5px dashed var(--c1l);color:var(--c1);padding:8px 16px;border-radius:50px;font-family:var(--fb);font-size:13px;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:6px;}
.abtn-add:hover{background:rgba(140,0,38,.13);}
.abtn-gold{background:var(--gold);color:var(--dark);border:none;padding:7px 16px;border-radius:50px;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
.abtn-gold:hover{background:var(--goldd);color:#fff;}
.atbl{width:100%;border-collapse:collapse;}
.atbl th{text-align:left;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--crd);}
.atbl td{padding:9px 10px;border-bottom:1px solid var(--crd);font-size:13px;vertical-align:middle;}
.atbl tr:last-child td{border-bottom:none;}
.atbl tr:hover td{background:rgba(0,0,0,.015);}
.arow{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid var(--crd);border-radius:var(--r1);margin-bottom:8px;background:var(--cr);}
.arow-main{flex:1;min-width:0;}
.arow-acts{display:flex;gap:6px;flex-shrink:0;align-items:flex-start;padding-top:2px;}
.color-line{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.color-line label{flex:1;font-size:13px;color:var(--dark);font-weight:500;}
.color-line input[type=color]{width:40px;height:30px;border:1px solid var(--crd);border-radius:5px;padding:2px;cursor:pointer;background:var(--cr);}
.file-drop{border:2px dashed var(--crd);border-radius:var(--r2);padding:22px;text-align:center;cursor:pointer;transition:.2s;background:var(--cr);}
.file-drop:hover{border-color:var(--gold);background:var(--goldp);}
.file-drop p{font-size:13px;color:var(--muted);margin-top:7px;}
.adm-badge{display:inline-block;background:rgba(140,0,38,.1);color:var(--c1);padding:2px 8px;border-radius:50px;font-size:11px;font-weight:600;}
.mod-acc{border:1px solid rgba(201,168,76,.2);border-radius:var(--r1);margin-top:9px;overflow:hidden;}
.mod-acc-hdr{display:flex;align-items:center;gap:8px;padding:9px 13px;background:rgba(201,168,76,.05);cursor:pointer;user-select:none;}
.mod-acc-hdr:hover{background:rgba(201,168,76,.1);}
.mod-acc-body{padding:13px;border-top:1px solid rgba(201,168,76,.15);display:none;}
.mod-acc-body.open{display:block;}
.les-row{display:flex;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--crd);}
.les-row:last-child{border-bottom:none;}
.les-num{width:24px;height:24px;background:var(--crd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;color:var(--muted);}




/* ── INSTAGRAM CAROUSEL ── */
.icar-section{background:var(--dark);padding:0 0 64px;position:relative;overflow:hidden;}
.icar-title{text-align:center;padding:40px 5vw 28px;position:relative;z-index:2;}
.icar-title h2{font-family:var(--fd);font-size:clamp(22px,3vw,32px);font-weight:300;color:var(--goldl);letter-spacing:.04em;}
.icar-title p{font-size:14px;color:rgba(255,248,240,.45);margin-top:6px;}

/* stage */
.icar-stage{position:relative;height:300px;display:flex;align-items:center;justify-content:center;perspective:1000px;margin:0 auto;max-width:900px;}
.icar-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);color:var(--goldl);width:44px;height:44px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s;backdrop-filter:blur(4px);}
.icar-arrow:hover{background:rgba(201,168,76,.35);transform:translateY(-50%) scale(1.07);}
.icar-arrow-left{left:8px;}.icar-arrow-right{right:8px;}

/* cards */
.icar-card{position:absolute;width:220px;border-radius:22px;overflow:hidden;cursor:pointer;user-select:none;transition:all .45s cubic-bezier(.4,0,.2,1);transform-origin:center;}
/* CENTER */
.icar-card[data-pos="0"]{transform:translateX(0) scale(1);z-index:5;opacity:1;filter:none;}
/* LEFT */
.icar-card[data-pos="-1"]{transform:translateX(-210px) scale(.76) rotateY(14deg);z-index:3;opacity:.62;filter:brightness(.75);}
/* RIGHT */
.icar-card[data-pos="1"]{transform:translateX(210px) scale(.76) rotateY(-14deg);z-index:3;opacity:.62;filter:brightness(.75);}
/* FAR LEFT (hidden) */
.icar-card[data-pos="-2"]{transform:translateX(-380px) scale(.55) rotateY(22deg);z-index:1;opacity:.2;filter:brightness(.4);}
/* FAR RIGHT (hidden) */
.icar-card[data-pos="2"]{transform:translateX(380px) scale(.55) rotateY(-22deg);z-index:1;opacity:.2;filter:brightness(.4);}

.icar-card-inner{background:linear-gradient(160deg,rgba(60,2,20,.9),rgba(26,0,8,.98));border:1px solid rgba(201,168,76,.18);height:264px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px 16px;text-align:center;}
.icar-card[data-pos="0"] .icar-card-inner{border-color:rgba(201,168,76,.55);box-shadow:0 0 40px rgba(201,168,76,.18),0 18px 50px rgba(0,0,0,.7);}
.icar-card-emoji{font-size:52px;line-height:1;margin-bottom:2px;}
.icar-card-label{font-family:var(--fd);font-size:22px;font-weight:500;color:var(--goldl);letter-spacing:.04em;}
.icar-card-sub{font-size:12px;color:rgba(255,248,240,.45);letter-spacing:.03em;}
.icar-card-hint{font-size:11px;color:rgba(201,168,76,.7);margin-top:4px;opacity:0;transition:opacity .3s;}
.icar-card[data-pos="0"] .icar-card-hint{opacity:1;}

/* gold line indicator */
.icar-dots{display:flex;justify-content:center;gap:8px;margin-top:18px;}
.icar-dot{width:28px;height:3px;border-radius:2px;background:rgba(255,255,255,.18);transition:.35s;}
.icar-dot.active{background:var(--gold);width:44px;}

/* CONTENT PANEL */
.icar-content{max-width:960px;margin:24px auto 0;padding:0 5vw;}
.icar-panel{display:none;animation:fadeUp .38s ease both;}
.icar-panel.open{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

/* courses panel */
.icp-courses{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.icp-ccard{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.14);border-radius:18px;overflow:hidden;cursor:pointer;transition:.25s;}
.icp-ccard:hover{background:rgba(201,168,76,.09);transform:translateY(-3px);border-color:rgba(201,168,76,.38);}
.icp-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:44px;}
.icp-body{padding:13px 15px;}
.icp-tag{display:inline-block;background:rgba(201,168,76,.18);color:var(--gold);padding:2px 8px;border-radius:50px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;}
.icp-name{font-family:var(--fd);font-size:16px;font-weight:500;color:var(--cr);line-height:1.2;margin-bottom:4px;}
.icp-meta{font-size:11.5px;color:rgba(255,248,240,.38);}

/* ebooks panel */
.icp-ebooks{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:14px;}
.icp-ebook{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.14);border-radius:18px;padding:18px 14px;text-align:center;cursor:pointer;transition:.25s;}
.icp-ebook:hover{background:rgba(201,168,76,.09);transform:translateY(-2px);}
.icp-ecov{width:58px;height:82px;border-radius:8px;margin:0 auto 11px;display:flex;align-items:center;justify-content:center;font-size:28px;}
.icp-etit{font-family:var(--fd);font-size:15px;font-weight:500;color:var(--cr);margin-bottom:4px;}
.icp-eprice{font-family:var(--fd);font-size:15px;font-weight:500;color:var(--gold);}
.icp-efree{color:#4ade80;}
.icp-ebtn{margin-top:9px;width:100%;padding:8px;background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.3);border-radius:50px;font-family:var(--fb);font-size:12px;font-weight:500;color:var(--goldl);cursor:pointer;transition:.2s;}
.icp-ebtn:hover{background:rgba(201,168,76,.4);}

/* turno panel */
.icp-turno{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.icp-tservs{display:flex;flex-direction:column;gap:8px;}
.icp-tserv{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.14);border-radius:14px;cursor:pointer;transition:.2s;}
.icp-tserv:hover,.icp-tserv.sel{background:rgba(201,168,76,.14);border-color:rgba(201,168,76,.45);}
.icp-tserv-icon{font-size:19px;}
.icp-tserv-name{font-size:13.5px;color:var(--cr);font-weight:500;}
.icp-tform{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.15);border-radius:18px;padding:20px;}
.icp-tform .fg label{color:rgba(255,248,240,.72);font-size:11px;}
.icp-tform .fg input,.icp-tform .fg select,.icp-tform .fg textarea{background:rgba(255,255,255,.07);border-color:rgba(201,168,76,.22);color:var(--cr);font-size:13px;}
.icp-tform .fg input:focus,.icp-tform .fg select:focus{border-color:var(--gold);background:rgba(255,255,255,.11);}
.icp-tform .fg input::placeholder,.icp-tform .fg textarea::placeholder{color:rgba(255,248,240,.28);}
.icp-tform select option{background:var(--dark);}
.icp-tform-title{font-family:var(--fd);font-size:18px;font-weight:500;color:var(--goldl);margin-bottom:13px;}
@media(max-width:700px){
  .icar-card[data-pos="-1"]{transform:translateX(-150px) scale(.72) rotateY(10deg);}
  .icar-card[data-pos="1"]{transform:translateX(150px) scale(.72) rotateY(-10deg);}
  .icar-card[data-pos="-2"]{transform:translateX(-280px) scale(.5) rotateY(18deg);}
  .icar-card[data-pos="2"]{transform:translateX(280px) scale(.5) rotateY(-18deg);}
  .icar-card{width:190px;}
  .icp-turno{grid-template-columns:1fr;}
  .icp-ebooks{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .icp-courses{grid-template-columns:1fr 1fr;}
}

/* ── VIDEO PLAYER ── */
.vid-area{background:#0a0005;position:relative;padding-bottom:0;overflow:hidden;aspect-ratio:16/9;min-height:220px;}
.vid-embed{position:absolute;inset:0;width:100%;height:100%;border:none;}
.vid-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:radial-gradient(ellipse at center,rgba(140,0,38,.25) 0%,rgba(10,0,5,1) 70%);}
.vid-no-url{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#0a0005;}
.vid-no-url-icon{font-size:48px;opacity:.3;}
.vid-no-url-txt{font-family:var(--fd);font-size:18px;color:rgba(255,248,240,.25);}
.vid-no-url-sub{font-size:12px;color:rgba(255,248,240,.15);}
.vid-type-badge{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.6);color:var(--gold);font-size:11px;font-weight:600;padding:3px 10px;border-radius:50px;letter-spacing:.06em;backdrop-filter:blur(4px);border:1px solid rgba(201,168,76,.25);}
/* mark complete bar */
.vid-complete-bar{background:var(--sw);border-top:1px solid var(--crd);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.vcb-left{display:flex;align-items:center;gap:10px;}
.vcb-status{width:22px;height:22px;border-radius:50%;border:2px solid var(--crd);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);transition:.25s;flex-shrink:0;}
.vcb-status.done{background:var(--gold);border-color:var(--gold);color:var(--dark);font-weight:700;}
.vcb-label{font-size:13.5px;color:var(--dark);font-weight:500;}
.vcb-label.done{text-decoration:line-through;color:var(--muted);}
.btn-mark-done{background:var(--c1);color:#fff;border:none;padding:8px 20px;border-radius:50px;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:.25s;}
.btn-mark-done:hover{background:var(--c1d);}
.btn-mark-done.done{background:var(--crd);color:var(--muted);cursor:default;}
/* real progress bar in viewer sidebar */
.vs-prog-wrap{padding:11px 16px 8px;border-bottom:1px solid var(--crd);}
.vs-prog-bar{height:5px;background:var(--crd);border-radius:3px;overflow:hidden;margin-top:5px;}
.vs-prog-fill{height:100%;background:linear-gradient(90deg,var(--c1),var(--gold));border-radius:3px;transition:width .5s;}
.vs-prog-txt{font-size:11.5px;color:var(--muted);margin-top:4px;}
/* admin video input */
.lv-input{width:100%;padding:6px 10px;border:1px solid var(--crd);border-radius:var(--r1);font-family:var(--fb);font-size:12px;color:var(--dark);outline:none;margin-top:4px;background:var(--cr);}
.lv-input:focus{border-color:var(--gold);}
.lv-input::placeholder{color:var(--muted);opacity:.5;}
.lv-hint{font-size:10.5px;color:var(--muted);margin-top:3px;}

/* ── CERTIFICADO ── */
.cert-wrap{position:fixed;inset:0;z-index:600;background:rgba(26,0,8,.85);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:20px;}
.cert-wrap.open{display:flex;}
.cert-card{background:#fff;border-radius:4px;width:100%;max-width:700px;position:relative;box-shadow:0 20px 80px rgba(0,0,0,.5);}
.cert-close{position:absolute;top:-14px;right:-14px;width:32px;height:32px;border-radius:50%;background:var(--c1);color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;}
#cert-canvas{width:100%;display:block;border-radius:4px;}
.cert-actions{display:flex;gap:10px;justify-content:center;margin-top:14px;}

/* ── STATS ACTUALIZADAS ── */
.scard-trend{font-size:11px;margin-top:3px;}
.scard-trend.up{color:#16a34a;}.scard-trend.neutral{color:var(--muted);}

/* ── CERT BADGE en cursos ── */
.cert-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,#B8860B,#DAA520);color:#fff;padding:4px 11px;border-radius:50px;font-size:11px;font-weight:600;cursor:pointer;transition:.2s;border:none;font-family:var(--fb);}
.cert-badge:hover{filter:brightness(1.1);transform:scale(1.04);}

/* ── BUSCADOR ── */
.search-wrap{position:relative;margin-bottom:16px;}
.search-inp{width:100%;padding:11px 16px 11px 40px;border-radius:50px;border:1px solid var(--crd);background:var(--sw);font-family:var(--fb);font-size:14px;color:var(--dark);outline:none;transition:.2s;}
.search-inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;color:var(--muted);}
.search-clear{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;display:none;line-height:1;}

/* ── PROGRESS PAGE ── */
.prog-course-row{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);padding:18px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px;}
.pcr-emoji{font-size:32px;flex-shrink:0;}
.pcr-info{flex:1;min-width:0;}
.pcr-title{font-family:var(--fd);font-size:18px;font-weight:500;color:var(--dark);margin-bottom:5px;}
.pcr-bar{height:7px;background:var(--crd);border-radius:4px;overflow:hidden;margin-bottom:4px;}
.pcr-fill{height:100%;background:linear-gradient(90deg,var(--c1),var(--gold));border-radius:4px;transition:width .5s;}
.pcr-meta{font-size:12px;color:var(--muted);}
.pcr-pct{font-family:var(--fd);font-size:22px;font-weight:500;color:var(--dark);flex-shrink:0;min-width:46px;text-align:right;}

/* ── NOTAS POR CLASE ── */
.notes-section{padding:0 32px 28px;max-width:740px;}
.notes-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.notes-title{font-family:var(--fd);font-size:20px;font-weight:500;color:var(--dark);display:flex;align-items:center;gap:8px;}
.notes-saved{font-size:11px;color:var(--gold-dk);opacity:0;transition:opacity .4s;}
.notes-saved.show{opacity:1;}
.notes-textarea{width:100%;min-height:120px;padding:14px 16px;border:1px solid var(--crd);border-radius:var(--r2);font-family:var(--fb);font-size:14px;color:var(--dark);background:var(--sw);resize:vertical;outline:none;transition:.2s;line-height:1.7;}
.notes-textarea:focus{border-color:var(--gold);background:#fff;}
.notes-textarea::placeholder{color:var(--muted);opacity:.5;}
.notes-hint{font-size:11.5px;color:var(--muted);margin-top:6px;}
@media(max-width:768px){.notes-section{padding:0 13px 20px;}}

/* ── ANALYTICS ── */
.analytics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:22px;}
.an-stat{background:linear-gradient(135deg,var(--dark),var(--darkm));border-radius:var(--r3);padding:20px;text-align:center;border:1px solid rgba(201,168,76,.2);}
.an-stat-num{font-family:var(--fd);font-size:36px;font-weight:500;color:var(--goldl);line-height:1;}
.an-stat-lbl{font-size:11.5px;color:rgba(255,248,240,.5);margin-top:5px;letter-spacing:.04em;text-transform:uppercase;}
.chart-wrap{background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);padding:20px;margin-bottom:18px;}
.chart-title{font-family:var(--fd);font-size:19px;font-weight:500;color:var(--dark);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.an-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.an-bar-label{font-size:12.5px;color:var(--dark);width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.an-bar-track{flex:1;height:18px;background:var(--crd);border-radius:9px;overflow:hidden;position:relative;}
.an-bar-fill{height:100%;border-radius:9px;transition:width .8s cubic-bezier(.4,0,.2,1);}
.an-bar-val{font-size:11.5px;color:var(--muted);width:36px;text-align:right;flex-shrink:0;}
.an-empty{text-align:center;padding:28px;color:var(--muted);font-size:14px;}
.an-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;}
.an-leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.an-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* ── TURNOS ESTADOS ── */
.turno-status{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600;border:none;cursor:pointer;font-family:var(--fb);transition:.2s;}
.ts-pending{background:#FFF3E0;color:#E65100;}
.ts-confirmed{background:#E8F5E9;color:#2E7D32;}
.ts-cancelled{background:#FFEBEE;color:#C62828;}
.ts-pending:hover{background:#FFE0B2;}
.ts-confirmed:hover{background:#C8E6C9;}
.ts-cancelled:hover{background:#FFCDD2;}
.wa-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:50px;background:#25D366;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:.2s;font-family:var(--fb);}
.wa-btn:hover{background:#1ebe5d;}

/* ── COURSE COVER IMAGE ── */
.cct-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cct-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(26,0,8,.72) 0%,rgba(26,0,8,.1) 60%);}
.cct-emoji-over{position:relative;z-index:2;font-size:52px;}
.cct-price-badge{position:absolute;top:10px;right:10px;z-index:3;background:linear-gradient(135deg,#B8860B,#DAA520);color:#fff;font-size:13px;font-weight:700;padding:5px 13px;border-radius:50px;font-family:var(--fb);box-shadow:0 2px 8px rgba(0,0,0,.35);}
.cct-free-badge{background:linear-gradient(135deg,#1a7a3a,#25a85a);}

/* ── BUY BUTTON ── */
.btn-buy{background:linear-gradient(135deg,var(--c1d),var(--c1));color:#fff;border:none;padding:8px 18px;border-radius:50px;font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;transition:.25s;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.btn-buy:hover{filter:brightness(1.12);transform:scale(1.04);}
.btn-buy-free{background:linear-gradient(135deg,#1a7a3a,#25a85a);}
.price-tag{font-family:var(--fd);font-size:17px;font-weight:500;color:var(--c1);}
.price-free{color:#1a7a3a;}
.price-strike{font-size:12px;color:var(--muted);text-decoration:line-through;margin-right:3px;}

/* ── ADMIN COVER UPLOADER ── */
.cover-upload-area{border:2px dashed var(--crd);border-radius:var(--r2);padding:20px;text-align:center;cursor:pointer;transition:.2s;position:relative;overflow:hidden;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.cover-upload-area:hover{border-color:var(--gold);background:var(--goldp);}
.cover-upload-area.has-img{border-style:solid;padding:0;}
.cover-preview{width:100%;height:140px;object-fit:cover;border-radius:calc(var(--r2) - 2px);display:block;}
.cover-upload-lbl{font-size:13px;color:var(--muted);}
.cover-upload-hint{font-size:11px;color:var(--muted);opacity:.7;}
.cover-clear-btn{position:absolute;top:8px;right:8px;background:rgba(26,0,8,.7);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;}
.cover-upload-area.has-img .cover-clear-btn{display:flex;}
.cover-upload-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

/* ── ADMIN LESSON CARDS ── */
.les-card{background:var(--cr);border:1px solid var(--crd);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;}
.les-card-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none;}
.les-card-hdr:hover{background:rgba(201,168,76,.06);}
.les-card-num{width:22px;height:22px;border-radius:50%;background:var(--c1);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.les-card-title-inp{flex:1;border:none;background:none;font-family:var(--fb);font-size:13.5px;color:var(--dark);font-weight:500;outline:none;min-width:0;}
.les-card-body{display:none;padding:12px 14px 14px;border-top:1px solid var(--crd);background:var(--sw);}
.les-card-body.open{display:block;}
.les-fields-row{display:grid;grid-template-columns:1fr 90px;gap:10px;margin-bottom:10px;}
.les-attach-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.les-attach-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--cr);border:1px solid var(--crd);border-radius:var(--r1);font-size:12.5px;}
.les-attach-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--dark);}
.les-attach-size{font-size:11px;color:var(--muted);flex-shrink:0;}
.les-attach-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;flex-shrink:0;}
.les-attach-del:hover{color:var(--c1);}

/* ── VIEWER ATTACHMENTS ── */
.attach-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--sw);border:1px solid var(--crd);border-radius:var(--r2);cursor:pointer;transition:.2s;}
.attach-item:hover{background:var(--goldp);border-color:rgba(201,168,76,.4);}
.attach-icon{font-size:22px;flex-shrink:0;}
.attach-name{font-size:13.5px;color:var(--dark);font-weight:500;}
.attach-size{font-size:11.5px;color:var(--muted);}
.attach-dl{margin-left:auto;font-size:11.5px;color:var(--c1);font-weight:600;flex-shrink:0;}

/* ── PRICE MODAL ── */
.price-section{background:var(--goldp);border:1px solid rgba(201,168,76,.3);border-radius:var(--r2);padding:14px 16px;margin-top:10px;}
.price-section h4{font-size:13px;font-weight:700;color:var(--goldd);letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px;}

/* ══ DRAG & DROP ══════════════════════════════════════ */
.dnd-handle{
  cursor:grab;padding:0 6px;color:rgba(0,0,0,.25);font-size:16px;
  flex-shrink:0;user-select:none;line-height:1;transition:color .15s;
  display:flex;align-items:center;
}
.dnd-handle:hover{color:var(--c1);}
.dnd-handle:active{cursor:grabbing;}

/* Curso card draggable */
.dnd-course-card{
  transition:transform .15s,box-shadow .15s,opacity .15s;
  cursor:default;
}
.dnd-course-card[draggable="true"]{touch-action:none;}
.dnd-course-card.is-dragging{
  opacity:.45;transform:scale(.98);
  box-shadow:0 2px 8px rgba(0,0,0,.08)!important;
}
.dnd-course-card.drag-over-top{
  border-top:3px solid var(--c1)!important;
  margin-top:-3px;
}
.dnd-course-card.drag-over-bottom{
  border-bottom:3px solid var(--c1)!important;
  margin-bottom:-3px;
}

/* Módulo draggable */
.mod-acc[draggable="true"]{touch-action:none;}
.mod-acc.is-dragging{opacity:.4;transform:scale(.98);}
.mod-acc.drag-over-top{border-top:3px solid var(--gold)!important;margin-top:-3px;}
.mod-acc.drag-over-bottom{border-bottom:3px solid var(--gold)!important;margin-bottom:-3px;}

/* Clase draggable */
.les-card[draggable="true"]{touch-action:none;}
.les-card.is-dragging{opacity:.4;transform:scale(.98);}
.les-card.drag-over-top{border-top:2px solid var(--c1l)!important;margin-top:-2px;}
.les-card.drag-over-bottom{border-bottom:2px solid var(--c1l)!important;margin-bottom:-2px;}

/* Ghost floating card while dragging */
.dnd-ghost{
  position:fixed;top:-200px;left:-200px;
  background:var(--sw);border:1.5px solid var(--crd);
  border-radius:var(--r1);padding:10px 14px;
  box-shadow:0 8px 32px rgba(26,0,8,.18);
  font-family:var(--fb);font-size:13px;color:var(--dark);
  pointer-events:none;z-index:9999;min-width:200px;max-width:280px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  opacity:.92;
}

/* Reorder hint badge */
.dnd-hint{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;color:var(--muted);
  background:rgba(0,0,0,.04);border:1px solid var(--crd);
  padding:3px 9px;border-radius:50px;margin-left:10px;
}


/* ── NOTIFICATIONS ── */
.notif-btn{position:relative;width:32px;height:32px;border-radius:var(--r2);background:none;border:1px solid var(--crd);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s;font-size:14px;}
.notif-btn:hover{background:var(--cr);}
.notif-badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--c1);color:#fff;font-size:9px;font-weight:700;display:none;align-items:center;justify-content:center;border:2px solid var(--sw);}
.notif-badge.show{display:flex;}
.notif-panel{position:absolute;top:50px;right:0;width:300px;background:var(--sw);border:1px solid var(--crd);border-radius:var(--r3);box-shadow:var(--s3);z-index:200;display:none;overflow:hidden;}
.notif-panel.open{display:block;animation:fadeUp .2s ease;}
.notif-hdr{padding:12px 16px;border-bottom:1px solid var(--crd);display:flex;align-items:center;justify-content:space-between;}
.notif-hdr-title{font-family:var(--fd);font-size:16px;font-weight:500;color:var(--dark);}
.notif-clear{font-size:11px;color:var(--c1);cursor:pointer;border:none;background:none;font-family:var(--fb);}
.notif-list{max-height:320px;overflow-y:auto;}
.notif-item{padding:11px 16px;border-bottom:1px solid var(--crd);display:flex;gap:10px;align-items:flex-start;transition:.15s;}
.notif-item:hover{background:var(--cr);}
.notif-item.unread{background:rgba(140,0,38,.04);}
.notif-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.notif-text{flex:1;min-width:0;}
.notif-title{font-size:13px;font-weight:500;color:var(--dark);line-height:1.3;}
.notif-time{font-size:11px;color:var(--muted);margin-top:2px;}
.notif-empty{padding:28px;text-align:center;color:var(--muted);font-size:13.5px;}
.topbar-right{display:flex;align-items:center;gap:8px;position:relative;}

/* ── DARK MODE ── */
/* Default IS dark mode — light mode overrides below */
body.light-mode{
  --cr:#FFF8F0;--crd:#E8D8CC;--sw:#FFFFFF;--muted:#8A6A5A;
  --dark:#1A0008;--darkm:#3A1020;
  background:var(--cr);color:var(--dark);
}
body.light-mode .topbar{background:#FFFFFF;border-color:#E8D8CC;}
body.light-mode .sidebar{background:#FFF0E8;border-color:#E8D8CC;}
body.light-mode .main-content{background:var(--cr);}
body.light-mode .scard{background:#FFFFFF;border:1px solid #E8D8CC;}
body.light-mode .scard-val{color:var(--c1) !important;}
body.light-mode .cc{background:#FFFFFF;border-color:#E8D8CC;}
body.light-mode .course-card{background:#FFFFFF;border-color:#E8D8CC;}
body.light-mode .car-tab.active{background:var(--c1);color:#fff;}
body.light-mode .ebook-card{background:#FFFFFF;border-color:#E8D8CC;}
body.light-mode .sb-item:hover{background:rgba(140,0,38,.07);}
body.light-mode .sb-item.active{background:var(--c1) !important;color:#fff !important;}
body.light-mode .mcard,.light-mode .auth-card{background:#FFFFFF;border-color:#E8D8CC;}
body.dark-mode{
  --cr:#0D0005;--crd:#2A0818;--sw:#160008;--muted:#A07880;
  --dark:#F0E6D3;--darkm:#D8CABC;
  background:var(--cr);color:var(--dark);
}

// ── ESTÉTICA ──────────────────────────────────────────

function rgbToHex(c){
  if(!c)return null;c=c.trim();
  if(c.startsWith('#'))return c;
  const m=c.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if(!m)return c;
  return'#'+[m[1],m[2],m[3]].map(x=>parseInt(x).toString(16).padStart(2,'0')).join('');
}

function admPreviewColor(cssVar,val){
  document.documentElement.style.setProperty(cssVar,val);
}

function admRenderEstetica(){
  const saved=JSON.parse(localStorage.getItem(KES)||'{}');
  const st=getComputedStyle(document.documentElement);
  const get=v=>saved[v]||rgbToHex(st.getPropertyValue(v).trim())||'';
  const map={'col-c1':'--c1','col-c1d':'--c1d','col-c1l':'--c1l','col-gold':'--gold','col-dark':'--dark','col-cr':'--cr'};
  Object.entries(map).forEach(([elId,cssVar])=>{const el=document.getElementById(elId);if(el)el.value=get(cssVar)||el.value;});
  const cfg=gCfg();
  const sn=document.getElementById('est-sitename');if(sn)sn.value=cfg.siteName||'';
  admUpdateBgPreview();admUpdateLogoPreview();
}

function admSaveColors(){
  const map={'col-c1':'--c1','col-c1d':'--c1d','col-c1l':'--c1l','col-gold':'--gold','col-dark':'--dark','col-cr':'--cr'};
  const saved=JSON.parse(localStorage.getItem(KES)||'{}');
  Object.entries(map).forEach(([elId,cssVar])=>{
    const el=document.getElementById(elId);
    if(el){saved[cssVar]=el.value;document.documentElement.style.setProperty(cssVar,el.value);}
  });
  localStorage.setItem(KES,JSON.stringify(saved));
  toast('✅ Colores guardados');
}

function admResetColors(){
  if(!confirm('¿Resetear todos los colores a los valores originales?'))return;
  localStorage.removeItem(KES);
  const defaults={'--c1':'#8C0026','--c1d':'#620018','--c1l':'#B0003A','--gold':'#C9A84C','--dark':'#1A0008','--cr':'#FFF8F0'};
  Object.entries(defaults).forEach(([k,v])=>document.documentElement.style.setProperty(k,v));
  admRenderEstetica();toast('✅ Colores reseteados');
}

function admUploadHeroBg(input,type){
  const file=input.files[0];if(!file)return;
  if(file.size>4*1024*1024){toast('⚠️ Archivo muy grande (máx 4MB). Comprimilo primero.');input.value='';return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{sBG({type,data:e.target.result});applyHeroBg();admUpdateBgPreview();toast('✅ Fondo actualizado');}
    catch(err){toast('⚠️ Error al guardar. El archivo puede ser muy grande.');}
  };
  reader.readAsDataURL(file);input.value='';
}

function admClearHeroBg(){sBG({});applyHeroBg();admUpdateBgPreview();toast('✅ Fondo removido');}

function admUpdateBgPreview(){
  const bg=gBG();const prev=document.getElementById('adm-bg-prev');if(!prev)return;
  prev.innerHTML='';
  if(bg.type==='image'&&bg.data){
    const img=document.createElement('img');img.src=bg.data;img.style.cssText='width:100%;height:100%;object-fit:cover;';prev.appendChild(img);
  }else if(bg.type==='video'&&bg.data){
    const vid=document.createElement('video');vid.src=bg.data;vid.autoplay=true;vid.loop=true;vid.muted=true;
    vid.style.cssText='width:100%;height:100%;object-fit:cover;';prev.appendChild(vid);
  }else{
    prev.style.background='linear-gradient(135deg,#1A0008,#620018)';prev.style.display='flex';prev.style.alignItems='center';prev.style.justifyContent='center';
    prev.innerHTML='<span style="color:rgba(255,255,255,.35);font-size:13px;">Degradé por defecto</span>';
  }
}

function admUploadLogo(input){
  const file=input.files[0];if(!file)return;
  if(file.size>1*1024*1024){toast('⚠️ Logo muy grande (máx 1MB).');input.value='';return;}
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const cfg=gCfg();cfg.logoData=e.target.result;sCfg(cfg);
      document.querySelectorAll('.logo-nav,.logo-hero,.logo-sb').forEach(img=>img.src=e.target.result);
      admUpdateLogoPreview();toast('✅ Logo actualizado');
    }catch(err){toast('⚠️ Error al guardar logo.');}
  };
  reader.readAsDataURL(file);input.value='';
}

function admClearLogo(){
  const cfg=gCfg();delete cfg.logoData;sCfg(cfg);admUpdateLogoPreview();toast('Logo removido');
}

function admUpdateLogoPreview(){
  const cfg=gCfg();const wrap=document.getElementById('logo-prev-wrap');const prev=document.getElementById('logo-prev');
  if(!wrap||!prev)return;
  if(cfg.logoData){prev.src=cfg.logoData;wrap.style.display='flex';}
  else wrap.style.display='none';
}

function admSaveSiteName(inputId){
  const val=document.getElementById(inputId).value.trim();if(!val)return;
  const cfg=gCfg();cfg.siteName=val;sCfg(cfg);
  ['site-name-nav','site-name-footer','sb-brand'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=val;});

}

const TXT_MAP={
  hero:[['txt-hero-tag','hero-tag'],['txt-hero-h1','hero-h1'],['txt-hero-sub','hero-sub'],['txt-hero-btn1','hero-btn1'],['txt-hero-btn2','hero-btn2']],
  stats:[['txt-s1v','s1v'],['txt-s1l','s1l'],['txt-s2v','s2v'],['txt-s2l','s2l'],['txt-s3v','s3v'],['txt-s3l','s3l'],['txt-s4v','s4v'],['txt-s4l','s4l']],
  feat:[['txt-feat-lbl','feat-lbl'],['txt-feat-tit','feat-tit']],
  cta:[['txt-cta-lbl','cta-lbl'],['txt-cta-tit','cta-tit'],['txt-cta-txt','cta-txt'],['txt-cta-btn','cta-btn']],
  footer:[['txt-footer-txt','footer-txt'],['txt-footer-sub','footer-sub']],
  turno:[['txt-turno-tit','turno-sec-tit'],['txt-turno-desc','turno-sec-desc']],
  com:[['txt-com-tit','com-tit'],['txt-com-txt','com-txt']],
};

function admRenderTextos(){
  const cfg=gCfg();const saved=cfg.texts||{};
  Object.entries(TXT_MAP).forEach(([,fields])=>{
    fields.forEach(([inpId,domId])=>{
      const inp=document.getElementById(inpId);const dom=document.getElementById(domId);
      if(inp){
        if(saved[domId]!==undefined)inp.value=saved[domId];
        else if(dom)inp.value=dom.textContent||dom.innerText||'';
      }
    });
  });
}

function admSaveTextos(section){
  const fields=TXT_MAP[section];if(!fields)return;
  const cfg=gCfg();if(!cfg.texts)cfg.texts={};
  fields.forEach(([inpId,domId])=>{
    const inp=document.getElementById(inpId);const dom=document.getElementById(domId);
    if(inp&&dom){cfg.texts[domId]=inp.value;dom.textContent=inp.value;}
  });
  sCfg(cfg);toast('✅ Textos guardados');
}

function loadSavedTexts(){
  const cfg=gCfg();const saved=cfg.texts||{};
  Object.entries(saved).forEach(([domId,val])=>{const el=document.getElementById(domId);if(el)el.textContent=val;});
  if(cfg.wsub){const el=document.getElementById('wsub');if(el)el.textContent=cfg.wsub;}
  if(cfg.logoData)document.querySelectorAll('.logo-nav,.logo-hero,.logo-sb').forEach(img=>img.src=cfg.logoData);
}

                <div class="les-card-num">${li+1}</div>
                <input class="les-card-title-inp" type="text"
                  value="${l.title}" id="lt-${m.id}-${l.id}"
                  placeholder="Título de la clase"
                  onclick="event.stopPropagation()">
                <button class="abtn-del" style="font-size:11px;padding:4px 8px;"

function admTogLesCard(mid,lid){
  const b=document.getElementById('lcbody-'+mid+'-'+lid);if(b)b.classList.toggle('open');
}

function admTogModAcc(modId){
  const b=document.getElementById('mab-'+modId);if(b)b.classList.toggle('open');
}

function admFlushEdits(){
  if(admCurEditId===null)return;
  const courses=gc();const c=courses.find(x=>x.id===admCurEditId);if(!c)return;
  (c.modules||[]).forEach(m=>{
    const mt=document.getElementById('mt-'+m.id);if(mt)m.title=mt.value;
    (m.lessons||[]).forEach(l=>{
      const lt=document.getElementById('lt-'+m.id+'-'+l.id);const ld=document.getElementById('ld-'+m.id+'-'+l.id);const ldesc=document.getElementById('ldesc-'+m.id+'-'+l.id);
      const lv=document.getElementById('lv-'+m.id+'-'+l.id);
      if(lt)l.title=lt.value;if(ld)l.duration=ld.value;if(ldesc)l.desc=ldesc.value;if(lv)l.videoUrl=lv.value.trim();
      // attachments are saved directly, no flush needed
    });
  });
  sc(courses);
}

function admSaveModuleInputs(modId){admFlushEdits();toast('✅ Módulo guardado');}

function admSaveCurso(isNew){
  const courses=gc();
  let c=admCurEditId!==null?courses.find(x=>x.id===admCurEditId):null;
  if(!c){c={id:Date.now(),modules:[]};courses.push(c);}
  c.emoji=document.getElementById('ce-emoji').value||'📚';
  c.title=document.getElementById('ce-title').value||'Nuevo curso';
  c.subtitle=document.getElementById('ce-subtitle').value||'';
  c.description=document.getElementById('ce-desc').value||'';
  c.level=document.getElementById('ce-level').value;
  c.levelLabel=document.getElementById('ce-levlbl').value||'';
  c.locked=document.getElementById('ce-locked').value==='1';
  c.color=document.getElementById('ce-color').value;
  const priceEl=document.getElementById('ce-price');if(priceEl)c.price=priceEl.value.trim();
  const payEl=document.getElementById('ce-paylink');if(payEl)c.payLink=payEl.value.trim();
  const covEl=document.getElementById('ce-cover-data');if(covEl)c.coverImg=covEl.value||'';
  admCurEditId=c.id;
  // Also flush any module/lesson edits
  (c.modules||[]).forEach(m=>{
    const mt=document.getElementById('mt-'+m.id);if(mt)m.title=mt.value;
    (m.lessons||[]).forEach(l=>{
      const lt=document.getElementById('lt-'+m.id+'-'+l.id);const ld=document.getElementById('ld-'+m.id+'-'+l.id);const ldesc=document.getElementById('ldesc-'+m.id+'-'+l.id);
      if(lt)l.title=lt.value;if(ld)l.duration=ld.value;if(ldesc)l.desc=ldesc.value;
    });
  });
  sc(courses);
  if(isNew){
    // Keep modal open, show modules section now
    document.getElementById('cmod-title').textContent='Editar: '+c.title;
    document.getElementById('cmod-body').innerHTML=admCursoForm(c,false);
    toast('✅ Curso creado. Ahora podés agregar módulos.');
  }else{
    admCloseEditor();toast('✅ Curso guardado');
  }
  admRenderCursosList();renderLanding();
}

function admDeleteCurso(id){
  if(!confirm('¿Eliminar este curso y todos sus módulos/clases?'))return;
  sc(gc().filter(c=>c.id!==id));admRenderCursosList();renderLanding();toast('Curso eliminado');
}

function admAddModule(){
  admFlushEdits();
  const courses=gc();const c=courses.find(x=>x.id===admCurEditId);if(!c){toast('⚠️ Guardá el curso primero');return;}
  if(!c.modules)c.modules=[];
  c.modules.push({id:'m'+Date.now(),title:'Nuevo módulo',lessons:[]});

// ── SLOT HELPERS (GLOBAL) ─────────────────────────
const DEFAULT_SLOTS=[
  {day:'Lunes',times:['09:00','10:30','12:00','15:00','16:30']},
  {day:'Martes',times:['09:00','10:30','14:00','15:30']},
  {day:'Miércoles',times:['09:00','11:00','14:00','16:00']},
  {day:'Jueves',times:['10:00','11:30','15:00','16:30']},
  {day:'Viernes',times:['09:00','10:30','12:00','14:00']},
  {day:'Sábado',times:['09:00','10:30','12:00']},
];
function gSlotsLoc(){try{return JSON.parse(localStorage.getItem('ms_slots')||'[]');}catch(e){return[];}}
function getSlotsForDate(dateStr){
  if(!dateStr)return[];
  const d=new Date(dateStr+'T00:00:00');
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const dayName=days[d.getDay()];
  const cfg=gSlotsLoc();
  const src=cfg.length?cfg:DEFAULT_SLOTS;
  const row=src.find(s=>s.day===dayName);
  return row?row.times:[];
}
function getTakenSlots(dateStr){
  return gT().filter(t=>t.date===dateStr&&t.status!=='cancelled').map(t=>t.time);
}

(function(){
  const ORDER = ['ebooks','cursos','turnos'];
  let centerIdx = 1; // cursos starts center

  function posOf(cardId){
    const ci = ORDER.indexOf(cardId);
    let diff = ci - centerIdx;
    // wrap: only 3 cards, positions -1,0,1
    if(diff > 1) diff -= ORDER.length;
    if(diff < -1) diff += ORDER.length;
    return diff;
  }

  function updatePositions(animate){
    const cards = document.querySelectorAll('.icar-card');
    cards.forEach(c => {
      const pos = posOf(c.dataset.id);
      c.setAttribute('data-pos', pos < -1 ? -2 : pos > 1 ? 2 : pos);
    });
    // dots
    document.querySelectorAll('.icar-dot').forEach(d => {
      d.classList.toggle('active', d.dataset.id === ORDER[centerIdx]);
    });
  }

  window.icarRotate = function(dir){
    // dir=1 → rotate right (next card comes to center)
    centerIdx = (centerIdx + dir + ORDER.length) % ORDER.length;
    updatePositions();
    // open the now-center panel without showing content yet
    openPanel(ORDER[centerIdx], false);
  };

  window.icarClick = function(card){
    const id = card.dataset.id;
    const pos = parseInt(card.getAttribute('data-pos'));
    if(pos !== 0){
      // bring to center
      centerIdx = ORDER.indexOf(id);
      updatePositions();
    }
    // toggle content
    openPanel(id, true);
  };

  function openPanel(id, toggle){
    const panels = document.querySelectorAll('.icar-panel');
    const target = document.getElementById('icp-'+id);
    if(!target) return;
    const isOpen = target.classList.contains('open');
    panels.forEach(p => p.classList.remove('open'));
    if(!isOpen || !toggle){ target.classList.add('open'); }
  }

  // ── SLOT HELPERS (delegated to global scope) ──
  // getSlotsForDate / getTakenSlots / DEFAULT_SLOTS are global (see below)

  window.icarLoadSlots=function(){
    const dateStr=document.getElementById('ict-date').value;
    const grid=document.getElementById('ict-slots-grid');
    if(!grid)return;
    if(!dateStr){grid.innerHTML='<div class="ict-no-slots">Seleccioná una fecha primero</div>';return;}
    const slots=getSlotsForDate(dateStr);
    const taken=getTakenSlots(dateStr);
    if(!slots.length){grid.innerHTML='<div class="ict-no-slots">No hay horarios para ese día</div>';return;}
    grid.innerHTML='';
    slots.forEach(function(t){
      const isTaken=taken.includes(t);
      const div=document.createElement('div');
      div.className='ict-slot'+(isTaken?' taken':'');
      div.textContent=t+(isTaken?' 🚫':'');
      if(!isTaken)div.onclick=function(){icarSelSlot(div,t);};
      grid.appendChild(div);
    });
    window._selSlot='';
    const selDiv=document.getElementById('ict-slot-selected');if(selDiv)selDiv.style.display='none';
  };
  window._selSlot='';window._selServ='';window._ictStep=0;

  window.icarSelSlot=function(el,time){
    document.querySelectorAll('.ict-slot').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');
    window._selSlot=time;
    const selDiv=document.getElementById('ict-slot-selected');
    if(selDiv){selDiv.style.display='';selDiv.textContent='⏰ Seleccionaste: '+time;}
  };

  window.icarSetServ=function(el,serv){
    document.querySelectorAll('.icp-tserv').forEach(e=>e.classList.remove('sel'));
    el.classList.add('sel');
    window._selServ=serv;
  };

  window.icarNextStep=function(step){
    if(step===1){
      const date=document.getElementById('ict-date').value;
      if(!date){toast('⚠️ Elegí una fecha');return;}
      if(!window._selSlot){toast('⚠️ Elegí un horario disponible');return;}
      const resumen=document.getElementById('ict-resumen');
      if(resumen){
        const serv=window._selServ||'Sin especificar';
        resumen.innerHTML='<strong>📋 Resumen de tu reserva:</strong><br>📌 Servicio: '+serv+'<br>📅 Fecha: '+date+'<br>⏰ Horario: '+window._selSlot;
      }
    }
    window._ictStep=step;
    [0,1,2].forEach(i=>{
      const s=document.getElementById('ict-step-'+i);if(s)s.classList.toggle('active',i===step);

// ═══ DASHBOARD REAL STATS ═══
function calcAllProgress(){
  const courses = gc().filter(c => !c.locked && c.modules && c.modules.length);
  let totalLessons = 0, totalDone = 0, completedCourses = 0;
  const inProgress = [];
  courses.forEach(c => {
    const prog = getProgress(c.id);
    const lessons = (c.modules||[]).reduce((a,m) => a + m.lessons.length, 0);
    const done = (c.modules||[]).reduce((a,m) => a + m.lessons.filter(l => l.done || !!prog[l.id]).length, 0);
    totalLessons += lessons;
    totalDone += done;
    const pct = lessons > 0 ? Math.round(done / lessons * 100) : 0;
    if(pct === 100) completedCourses++;
    if(pct > 0 && pct < 100) inProgress.push({c, done, lessons, pct});
    if(pct === 0) inProgress.push({c, done:0, lessons, pct:0}); // show 0% too
  });
  return {totalLessons, totalDone, completedCourses, inProgress, courses};
}

function updateDashStats(){
  const {totalLessons, totalDone, completedCourses, inProgress, courses} = calcAllProgress();
  const activeCourses = courses.filter(c => {
    const prog = getProgress(c.id);
    const lessons = (c.modules||[]).reduce((a,m) => a + m.lessons.length, 0);
    const done = (c.modules||[]).reduce((a,m) => a + m.lessons.filter(l => l.done || !!prog[l.id]).length, 0);
    return done > 0;
  }).length;
  const pct = totalLessons > 0 ? Math.round(totalDone / totalLessons * 100) : 0;
  const sv = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
  sv('stat-active', activeCourses);
  sv('stat-active-sub', `de ${courses.length} disponibles`);
  sv('stat-done', totalDone);
  sv('stat-done-sub', `de ${totalLessons} clases`);
  sv('stat-pct', pct + '%');
  sv('stat-pct-sub', 'en todos los cursos');
  sv('stat-certs', completedCourses);
  sv('stat-certs-sub', completedCourses === 1 ? 'curso completado' : 'cursos completados');
  // continue cards
  renderContinueCards(inProgress);
  // progress page
  renderProgressPage(pct, totalDone, totalLessons);
}

function renderContinueCards(inProgress){
  const wrap = document.getElementById('cc-wrap-dynamic');
  const hdg = document.getElementById('cc-heading');
  if(!wrap) return;
  const showing = inProgress.filter(x => x.pct > 0).sort((a,b) => b.pct - a.pct).slice(0, 4);
  if(!showing.length){
    if(hdg) hdg.style.display = 'none';
    wrap.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:12px 0;">Aún no comenzaste ningún curso. ¡Explorá los disponibles arriba!</div>';
    return;
  }
  if(hdg) hdg.style.display = '';
  wrap.innerHTML = showing.map(({c, done, lessons, pct}) => {
    const nextLesson = findNextLesson(c);
    const nextTxt = nextLesson ? nextLesson.title : 'Continuar';
    return `<div class="cc" onclick="openViewer(${c.id})">
      <div class="cc-thumb">${c.emoji}</div>
      <div style="flex:1;min-width:0;">
        <div class="cc-title">${c.title}</div>
        <div class="cc-meta">${nextTxt}</div>
        <div class="pb"><div class="pf" style="width:${pct}%"></div></div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:3px;">
          <div class="pl">${pct}% completado</div>
          ${pct===100 ? '<button class="cert-badge" onclick="event.stopPropagation();showCert('+c.id+')">🏆 Certificado</button>' : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function findNextLesson(c){
  const prog = getProgress(c.id);
  for(const m of (c.modules||[])){
    for(const l of (m.lessons||[])){
      if(!l.done && !prog[l.id]) return l;
    }
  }
  return null;
}

function renderProgressPage(totalPct, totalDone, totalLessons){
  const tb = document.getElementById('prog-total-bar');
  const tp = document.getElementById('prog-total-pct');
  const ts = document.getElementById('prog-total-sub');
  if(tb) tb.style.width = totalPct + '%';
  if(tp) tp.textContent = totalPct + '%';
  if(ts) ts.textContent = totalDone + ' de ' + totalLessons + ' clases completadas';
  const list = document.getElementById('prog-courses-list');
  if(!list) return;
  const courses = gc().filter(c => !c.locked && c.modules && c.modules.length);
  list.innerHTML = courses.map(c => {
    const prog = getProgress(c.id);
    const lessons = (c.modules||[]).reduce((a,m) => a + m.lessons.length, 0);
    const done = (c.modules||[]).reduce((a,m) => a + m.lessons.filter(l => l.done || !!prog[l.id]).length, 0);
    const pct = lessons > 0 ? Math.round(done / lessons * 100) : 0;
    return `<div class="prog-course-row">
      <div class="pcr-emoji">${c.emoji}</div>
      <div class="pcr-info">
